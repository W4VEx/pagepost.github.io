<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมสร้างใบปะหน้าส่งสินค้า</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sender">
            <h2>ชื่อผู้ส่งสินค้า</h2>
            <p>ชื่อผู้ส่ง</p><input id="nsen" type="text" placeholder="ชื่อผู้ส่ง"/>
            <p>ที่อยู่ผู้ส่ง</p><textarea id="senadd" placeholder="ที่อยู่ผู้ส่ง"></textarea>
            <p>เบอร์โทรผู้ส่ง</p><input id="senphone" type="text" placeholder="เบอร์โทรผู้ส่ง"/>
        </div>

          
        <div class="receiver">
            <h2>ชื่อผู้รับสินค้า</h2>
            <p>ชื่อผู้รับ</p><input id="recna" type="text" placeholder="ชื่อผู้รับ"/>
            <p>ที่อยู่ผู้รับ</p><textarea id="revaadd" placeholder="ที่อยู่ผู้รับ"></textarea>
            <p>เบอร์โทรผู้รับ</p><input id="revphone" type="text" placeholder="เบอร์โทรผู้รับ"/>  
        </div>

    </div>

    <div id="show" class="submit"> Submit </div>


    <div class="container2">
          <div id="shsen" >
             <!-- ชื่อผู้ส่ง -->
            <span id="showname" class="showsen"></span>  
            <!-- ที่อยู่ผู้ส่ง -->
            <span id="showaddress" class="showsen"></span>
            <!-- เบอร์โทรผู้้ส่ง -->
            <span id="showphone" class="showsen"></span>

          </div>

         
          <div id="shrec" >
             <!-- ชื่อผู้รับ -->
            <span id="shownamerec" class="showrev"></span>  
            <!-- ที่อยู่ผู้รับ -->
            <span id="showaddrev" class="showrev"></span>
            <!-- เบอร์โทรผู้รับ -->
            <span id="showphonerev" class="showrev"></span>

          </div>


    </div>


</div>

<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
<script src="script.js">
    
l</script>

</body>
</html>
